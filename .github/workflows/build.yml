name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - uses: actions/checkout@v3

    - name: Install Dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y qt6-base-dev qt6-declarative-dev qt6-svg-dev cmake build-essential libasound2-dev libgl1-mesa-dev

    - name: Install Qt (Windows/macOS)
      if: matrix.os != 'ubuntu-latest'
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.0'
        modules: 'qt5compat qtmultimedia qtsvg'

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release --parallel 4

    - name: Run Tests
      working-directory: ${{github.workspace}}/build
      run: ctest -C Release --output-on-failure
