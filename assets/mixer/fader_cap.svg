<svg width="40" height="30" viewBox="0 0 40 30" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cap-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d3d3d"/>
      <stop offset="20%" stop-color="#5a5a5a"/>
      <stop offset="50%" stop-color="#404040"/>
      <stop offset="80%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>
  
  <rect x="4" y="2" width="32" height="26" rx="3" fill="url(#cap-grad)" filter="url(#shadow)" stroke="#111" stroke-width="1"/>
  
  <!-- Grip lines -->
  <line x1="8" y1="10" x2="32" y2="10" stroke="#111" stroke-width="1"/>
  
  <!-- White indicator line -->
  <line x1="6" y1="15" x2="34" y2="15" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  
  <line x1="8" y1="20" x2="32" y2="20" stroke="#111" stroke-width="1"/>
</svg>
