<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bezel-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <linearGradient id="body-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2c2c2c"/>
      <stop offset="100%" stop-color="#3d3d3d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>
  
  <!-- Shadow and Bezel -->
  <circle cx="32" cy="32" r="28" fill="url(#bezel-grad)" filter="url(#shadow)"/>
  
  <!-- Knob Body -->
  <circle cx="32" cy="32" r="26" fill="url(#body-grad)"/>
  
  <!-- Inner Grip Ring -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#222" stroke-width="1.5" stroke-dasharray="2 3"/>
  
  <!-- Top Highlight -->
  <path d="M 32 6 A 26 26 0 0 1 50 13 A 24 24 0 0 0 32 8 A 24 24 0 0 0 14 13 A 26 26 0 0 1 32 6 Z" fill="#ffffff" fill-opacity="0.1"/>
</svg>
